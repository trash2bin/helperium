<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Data Service — Swagger UI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>html{box-sizing:border-box;overflow:-moz-scrollbars-vertical;overflow-y:scroll}*,*:before,*:after{box-sizing:inherit}body{margin:0;background:#fafafa}
  .tenant-bar{position:fixed;top:12px;right:16px;z-index:9999;background:#fff;border:1px solid #e5e7eb;padding:6px 10px;border-radius:8px;display:flex;gap:8px;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,0.06);font:13px system-ui}
  .tenant-bar input{border:1px solid #d1d5db;border-radius:6px;padding:4px 8px;width:160px}
  .tenant-bar button{border:1px solid #2563eb;background:#2563eb;color:#fff;border-radius:6px;padding:4px 10px;cursor:pointer}
  </style>
</head>
<body>
  <div class="tenant-bar">
    <label for="tenant">Tenant:</label>
    <input id="tenant" placeholder="default" />
    <button id="applyTenant">Apply</button>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js" crossorigin></script>
  <script>
    const qs = new URLSearchParams(window.location.search);
    const tenantInput = document.getElementById('tenant');
    if (tenantInput && qs.has('tenant')) tenantInput.value = qs.get('tenant');
    document.getElementById('applyTenant')?.addEventListener('click', () => {
      const val = (document.getElementById('tenant').value || '').trim();
      const url = new URL(window.location.origin + '/docs' + (val ? '?tenant=' + encodeURIComponent(val) : ''));
      window.location.href = url.toString();
    });
    SwaggerUIBundle({
      url: "/openapi.json" + window.location.search,
      dom_id: "#swagger-ui",
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      layout: "StandaloneLayout",
      defaultModelsExpandDepth: -1
    });
  </script>
</body>
</html>
