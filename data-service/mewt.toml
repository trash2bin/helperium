db = "mewt.sqlite"

[log]
level = "info"

[targets]
include = ["cmd/**/*.go", "internal/**/*.go"]
ignore = ["test", "vendor", "mock", "postgres_adapter"]

# Per-target test commands: first match wins.
# Order matters — most specific packages first, catch-all last.

[[per_target]]
glob = "internal/runtime/*.go"
test.cmd = "go test ./internal/runtime/... -count=1 -timeout 60s"

[[per_target]]
glob = "internal/runtime/handlers/*.go"
test.cmd = "go test ./internal/runtime/handlers/... -count=1 -timeout 60s"

[[per_target]]
glob = "internal/server/*.go"
test.cmd = "go test ./internal/server/... -count=1 -timeout 120s"

[[per_target]]
glob = "internal/datasource/*.go"
test.cmd = "go test ./internal/datasource/... -count=1 -timeout 120s"

[[per_target]]
glob = "internal/seedgen/*.go"
test.cmd = "go test ./internal/seedgen/... -count=1 -timeout 60s"

[[per_target]]
glob = "internal/configgen/*.go"
test.cmd = "go test ./internal/configgen/... -count=1 -timeout 60s"

[[per_target]]
glob = "internal/openapigen/*.go"
test.cmd = "go build ./internal/openapigen/..."

# Catch-all
[[per_target]]
glob = "**/*.go"
test.cmd = "go test ./... -count=1 -timeout 180s"

# Default test command (if no per_target matches)
[test]
cmd = "go test ./... -count=1 -timeout 180s"
