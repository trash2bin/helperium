
  <!-- ── API Toast Container ── -->
  <!-- ── API Toast Container ── -->
  <div x-data class="api-toast-container">
    <template x-for="t in $store.apiLogger.apiToasts" :key="t.id">
      <div class="api-toast" :class="t.class" @click.prevent="$store.apiLogger.dismissToast(t.id); $store.apiLogger.selectEntry(t.entryId)">
        <span x-text="t.text"></span>
        <span class="api-toast-close" @click.stop="$store.apiLogger.dismissToast(t.id)">✕</span>
      </div>
    </template>
  </div>

  <!-- ── API Debug Panel ── -->
  <!-- ── API Debug Panel ── -->
  <div x-data class="api-debug-panel-overlay" x-show="$store.apiLogger.showPanel" x-cloak @click="$store.apiLogger.showPanel=false">
    <div class="api-debug-panel" @click.stop>
      <div class="api-debug-header">
        <h3>🐛 API Log</h3>
        <button @click="$store.apiLogger.showPanel=false" class="api-debug-close">✕</button>
      </div>
      <div class="api-debug-body">
        <template x-if="!$store.apiLogger.selectedEntry">
          <div>
            <div class="api-log-empty" x-show="$store.apiLogger.entries.length === 0" x-text="'No requests yet'"></div>
            <template x-for="e in $store.apiLogger.entries" :key="e.id">
              <div class="api-log-row" :class="{'api-log-err': e.status >= 400}" @click="$store.apiLogger.selectEntry(e.id)">
                <span class="api-log-status" :class="'api-status-' + Math.floor(e.status / 100) + 'xx'">[<span x-text="e.status"></span>]</span>
                <span class="api-log-method" x-text="e.method"></span>
                <span class="api-log-path" x-text="e.path"></span>
                <span class="api-log-duration" x-text="e.durationMs + 'ms'"></span>
              </div>
            </template>
          </div>
        </template>
        <template x-if="$store.apiLogger.selectedEntry">
          <div class="api-log-detail">
            <button @click="$store.apiLogger.closeDetail()" class="btn btn-sm">← Back</button>
            <div class="api-log-detail-row">
              <strong><span x-text="$store.apiLogger.selectedEntry.method"></span> <span x-text="$store.apiLogger.selectedEntry.path"></span></strong>
              <span>Status: <span x-text="$store.apiLogger.selectedEntry.status"></span></span>
              <span>Duration: <span x-text="$store.apiLogger.selectedEntry.durationMs + 'ms'"></span></span>
              <span>Time: <span x-text="$store.apiLogger.selectedEntry.ts"></span></span>
            </div>
            <div class="api-log-detail-section">
              <h4>Request Body</h4>
              <pre x-show="$store.apiLogger.selectedEntry.reqBody" x-text="$store.apiLogger.selectedEntry.reqBody"></pre>
              <span x-show="!$store.apiLogger.selectedEntry.reqBody" class="text-muted">(no body)</span>
            </div>
            <div class="api-log-detail-section">
              <h4>Response</h4>
              <pre x-text="$store.apiLogger.selectedEntry.resBody"></pre>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>


  <script src="/dist/app.js"></script>
</body>
</html>
