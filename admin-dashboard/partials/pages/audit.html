  <div x-show="page === 'audit'" x-cloak>
    <div class="page-header">
      <div class="page-header-left">
        <h2 class="page-title"><span x-text="__('nav.audit')"></span></h2>
        <p class="page-subtitle" x-text="__('audit.subtitle')"></p>
      </div>
      <div class="page-header-right">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#8b949e;">
          <span x-text="__('audit.show')"></span>
          <select x-model="auditLimit" @change="loadAudit()" style="background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:4px 8px;">
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="200">200</option>
            <option value="500">500</option>
          </select>
        </label>
        <button @click="loadAudit()" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;">
          <span x-text="__('audit.refresh')"></span>
        </button>
      </div>
    </div>

    <div x-show="auditLoading" style="text-align:center;padding:40px;color:#8b949e;" x-text="__('audit.loading')"></div>
    <div x-show="auditError" style="padding:12px;background:#3d1f1f;border:1px solid #6b3030;border-radius:6px;margin:16px;color:#f0c6c6;" x-text="auditError"></div>

    <div x-show="!auditLoading && !auditError && auditEntries.length === 0" style="text-align:center;padding:40px;color:#8b949e;" x-text="__('audit.empty')"></div>

    <div x-show="!auditLoading && auditEntries.length > 0" style="margin:16px;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead>
          <tr style="border-bottom:2px solid #21262d;">
            <th style="text-align:left;padding:8px 12px;color:#8b949e;font-weight:500;" x-text="__('audit.time')"></th>
            <th style="text-align:left;padding:8px 12px;color:#8b949e;font-weight:500;" x-text="__('audit.role')"></th>
            <th style="text-align:left;padding:8px 12px;color:#8b949e;font-weight:500;" x-text="__('audit.action')"></th>
            <th style="text-align:left;padding:8px 12px;color:#8b949e;font-weight:500;" x-text="__('audit.resource')"></th>
            <th style="text-align:left;padding:8px 12px;color:#8b949e;font-weight:500;" x-text="__('audit.details')"></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="(entry, i) in auditEntries" :key="i">
            <tr style="border-bottom:1px solid #21262d;" :style="{background: i % 2 === 0 ? 'transparent' : '#0d1117'}">
              <td style="padding:8px 12px;white-space:nowrap;font-size:12px;color:#8b949e;" x-text="auditTimestamp(entry.timestamp)"></td>
              <td style="padding:8px 12px;">
                <span :style="{color: entry.actor_role === 'admin' ? '#58a6ff' : '#8b949e'}" x-text="entry.actor_role || '—'"></span>
              </td>
              <td style="padding:8px 12px;" x-text="auditActionLabel(entry.action)"></td>
              <td style="padding:8px 12px;color:#7ee787;font-family:monospace;font-size:12px;" x-text="entry.resource || '—'"></td>
              <td style="padding:8px 12px;color:#8b949e;font-size:12px;word-break:break-all;max-width:400px;" x-text="entry.details || ''"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
