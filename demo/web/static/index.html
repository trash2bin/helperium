<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Helperium Demo</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">MCP + Ollama</p>
        <h1>AI Agent Dashboard</h1>
      </div>
      <div class="topbar-right">
        <div class="tenant-selector">
          <label for="tenantSelect" class="tenant-label">Database:</label>
          <select id="tenantSelect" class="tenant-select">
            <option value="">Loading…</option>
          </select>
        </div>
        <div class="tenant-selector" style="margin-left:8px;">
          <label for="agentSelect" class="tenant-label">🤖 Agent:</label>
          <select id="agentSelect" class="tenant-select">
            <option value="">None (direct chat with tenant)</option>
          </select>
        </div>
        <div class="status" id="status">API: checking</div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div>
          <h2>Data from connected database</h2>
          <p>All entities are available to the model via MCP tools.</p>
        </div>
        <div class="metric-grid" id="metrics"></div>
      </section>

      <section class="tabs" aria-label="Data sections" id="tabBar">
      <span class="tab-placeholder">Loading entities…</span>
    </section>

      <section class="data-shell">
        <div class="section-title">
          <h2 id="tableTitle">Students</h2>
          <input id="filter" type="search" placeholder="Filter">
        </div>
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- Stub chat DOM — kept for app.js compatibility (hidden, non-interactive).
         app.js functions (restoreServerHistory, addMessage, streamChat, etc.)
         reference #messages, #chatForm, #chatInput, #chatWidget, #openChat.
         Removing them causes cascading TypeError crashes in app.js. -->
    <div id="chatWidget" style="display:none"></div>
    <div id="messages" style="display:none"></div>
    <div id="chatForm" style="display:none"></div>
    <div id="chatInput" style="display:none"></div>
    <div id="openChat" style="display:none"></div>
    <div id="collapseChat" style="display:none"></div>

    <!-- Embed widget — Shadow DOM, independent from app.js -->
    <script src="/embed/embed.js" data-agent="default">
    </script>

    <script src="/static/app.js"></script>
  </body>
</html>
