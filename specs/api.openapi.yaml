openapi: 3.1.0
info:
  title: Agent-Tutor Core API
  description: Backend API for the Agent-Tutor system. Handles orchestration, session
    history, and tool integration.
  version: 1.1.0
paths:
  /health:
    get:
      summary: Проверка здоровья API
      description: Проверяет работоспособность API и доступность LLM провайдера.
      operationId: health_endpoint_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/chat:
    post:
      summary: Стриминг чата
      description: Основной эндпоинт для общения с агентом. Возвращает поток SSE событий.
      operationId: chat_endpoint_api_chat_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/backlog:
    get:
      summary: Список сессий бэклога
      description: Возвращает список всех сохраненных сессий из бэклога.
      operationId: backlog_list_endpoint_api_backlog_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacklogListResponse'
  /api/backlog/{session_id}:
    get:
      summary: Детали сессии бэклога
      description: Возвращает все события конкретной сессии.
      operationId: backlog_detail_endpoint_api_backlog__session_id__get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacklogDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/backlog/stats/{session_id}:
    get:
      summary: Статистика LLM-вызовов сессии
      description: Возвращает агрегированную статистику по токенам, стоимости и количеству
        вызовов для сессии.
      operationId: backlog_stats_endpoint_api_backlog_stats__session_id__get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/backlog/errors:
    get:
      summary: Последние ошибки бэклога
      description: Возвращает последние ошибки по всем сессиям.
      operationId: backlog_errors_endpoint_api_backlog_errors_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/session/history:
    get:
      summary: История сессии
      description: Возвращает историю сообщений для указанной сессии.
      operationId: session_history_endpoint_api_session_history_get
      parameters:
      - name: session_id
        in: query
        required: false
        schema:
          type: string
          default: default
          title: Session Id
      - name: agent_name
        in: query
        required: false
        schema:
          type: string
          title: Agent Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionHistoryResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /admin/guardrails:
    get:
      summary: Get Guardrails
      description: Get current guard config.
      operationId: get_guardrails_admin_guardrails_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    post:
      summary: Update Guardrails
      description: 'Update guard config. Accepts: enabled, block_on_match.'
      operationId: update_guardrails_admin_guardrails_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
              title: Config
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /admin/spending:
    get:
      summary: Get All Spending
      description: Get spending overview.
      operationId: get_all_spending_admin_spending_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /admin/spending/{tenant_id}:
    get:
      summary: Get Tenant Spending
      description: Get spending for a specific tenant.
      operationId: get_tenant_spending_admin_spending__tenant_id__get
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          title: Tenant Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      summary: Set Tenant Budget
      description: 'Set per-tenant budget override.


        Body: {"budget": 100.0}'
      operationId: set_tenant_budget_admin_spending__tenant_id__post
      parameters:
      - name: tenant_id
        in: path
        required: true
        schema:
          type: string
          title: Tenant Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              title: Config
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /admin/abuse-config:
    get:
      summary: Get Abuse Config
      description: Get the current effective abuse configuration (from file + env).
      operationId: get_abuse_config_admin_abuse_config_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    post:
      summary: Save Abuse Config
      description: Save new abuse config directly (admin dashboard alternative endpoint).
      operationId: save_abuse_config_admin_abuse_config_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
              title: Data
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /admin/abuse-config/reload:
    post:
      summary: Reload Abuse Config
      description: 'Reload abuse config from disk and apply runtime settings.


        Called by admin-dashboard after saving new config.

        Applies runtime settings (history, loops) to the live settings object.'
      operationId: reload_abuse_config_admin_abuse_config_reload_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /admin/llm-providers:
    get:
      summary: List Llm Providers
      description: List all LLM providers with masked API keys.
      operationId: list_llm_providers_admin_llm_providers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    post:
      summary: Add Llm Provider
      description: "Add a new LLM provider.\n\nBody:\n    name (required): unique\
        \ provider name\n    model (required): model identifier (e.g. openai/gpt-4o,\
        \ anthropic/claude-3-sonnet)\n    provider: provider type — auto-detected\
        \ from model prefix if omitted\n    api_key: API key (will not be returned\
        \ in full)\n    api_base: custom API base URL\n    enabled: whether the provider\
        \ is active (default: true)"
      operationId: add_llm_provider_admin_llm_providers_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
              title: Body
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /admin/llm-provider-list:
    get:
      summary: List Litellm Providers
      description: List all available providers from LiteLLM (live, no hardcode).
      operationId: list_litellm_providers_admin_llm_provider_list_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /admin/llm-providers/{name}:
    get:
      summary: Get Llm Provider
      description: Get a single LLM provider with masked API key.
      operationId: get_llm_provider_admin_llm_providers__name__get
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      summary: Update Llm Provider
      description: 'Update an existing LLM provider.


        Omitted fields keep their current value.

        Set api_key="" to keep existing key (not change it).

        Set api_key="__clear__" to clear the key.'
      operationId: update_llm_provider_admin_llm_providers__name__put
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              title: Body
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Llm Provider
      description: Delete an LLM provider.
      operationId: delete_llm_provider_admin_llm_providers__name__delete
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /admin/llm-providers/{name}/toggle:
    post:
      summary: Toggle Llm Provider
      description: Toggle a provider on/off.
      operationId: toggle_llm_provider_admin_llm_providers__name__toggle_post
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /admin/llm-config:
    get:
      summary: Get Llm Config
      description: Get current LLM provider fallback configuration.
      operationId: get_llm_config_admin_llm_config_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/voice-config:
    get:
      summary: Get Voice Config
      description: Get current voice (STT/TTS) configuration.
      operationId: get_voice_config_api_voice_config_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    put:
      summary: Update Voice Config
      description: 'Update and persist voice configuration.


        Preserves existing api_key/api_base/voice per provider when the

        incoming value is None or empty (masks sensitive fields).'
      operationId: update_voice_config_api_voice_config_put
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
              title: Body
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Update Voice Config Api Voice Config Put
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/agents:
    get:
      summary: Список агентов
      description: Возвращает список всех созданных агентов.
      operationId: list_agents_endpoint_api_agents_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'
    post:
      summary: Создать агента
      description: Создаёт нового агента с указанными tenant_id.
      operationId: create_agent_endpoint_api_agents_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreateRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/agents/{name}:
    get:
      summary: Получить агента
      description: Возвращает данные конкретного агента по имени.
      operationId: get_agent_endpoint_api_agents__name__get
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      summary: Обновить агента
      description: Обновляет описание и/или tenant_id агента.
      operationId: update_agent_endpoint_api_agents__name__put
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Удалить агента
      description: Удаляет агента по имени.
      operationId: delete_agent_endpoint_api_agents__name__delete
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/agents/{name}/widget-config:
    get:
      summary: Конфиг виджета для агента
      description: Возвращает настройки embed-виджета для указанного агента.
      operationId: agent_widget_config_endpoint_api_agents__name__widget_config_get
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Agent Widget Config Endpoint Api Agents  Name  Widget
                  Config Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/chat/voice:
    post:
      summary: Chat Voice Endpoint
      description: 'Voice chat endpoint.


        Accepts an audio file via multipart/form-data, transcribes it via

        the configured STT provider(s), feeds the text through the existing

        chat pipeline, and streams the response as SSE events.


        If TTS providers are configured, the final answer is also sent as

        an ``type="audio"`` SSE event with base64-encoded audio bytes.'
      operationId: chat_voice_endpoint_api_chat_voice_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_chat_voice_endpoint_api_chat_voice_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/chat/{name}:
    post:
      summary: Чат с агентом по имени
      description: Стриминг чата с конкретным агентом. Tenant IDs берутся из конфига
        агента.
      operationId: chat_by_agent_endpoint_api_chat__name__post
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AgentCreateRequest:
      properties:
        name:
          type: string
          minLength: 1
          pattern: ^[a-z][a-z0-9_-]*$
          title: Name
          description: Unique agent name (lowercase, no spaces)
        description:
          type: string
          title: Description
          description: Human-readable description
          default: ''
        tenant_ids:
          items:
            type: string
          type: array
          title: Tenant Ids
          description: Tenant IDs for this agent
        widget_config:
          anyOf:
          - $ref: '#/components/schemas/WidgetConfig'
          - type: 'null'
          description: Embed widget display configuration
        llm_config:
          anyOf:
          - $ref: '#/components/schemas/LLMConfig'
          - type: 'null'
          description: Per-agent LLM overrides
        provider_priority:
          items:
            type: string
          type: array
          title: Provider Priority
          description: Provider names in priority order (from ProviderStore)
        abuse_config:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Abuse Config
          description: Per-agent abuse settings overrides (keys match AbuseConfig
            fields)
        system_prompt:
          anyOf:
          - type: string
          - type: 'null'
          title: System Prompt
          description: Per-agent system prompt override
        voice_config:
          anyOf:
          - $ref: '#/components/schemas/VoiceAgentConfig'
          - type: 'null'
          description: Per-agent voice configuration overrides
      type: object
      required:
      - name
      title: AgentCreateRequest
      description: Request to create a new agent.
    AgentListResponse:
      properties:
        agents:
          items:
            $ref: '#/components/schemas/AgentResponse'
          type: array
          title: Agents
          description: List of agents
      type: object
      required:
      - agents
      title: AgentListResponse
      description: List of agents.
    AgentResponse:
      properties:
        name:
          type: string
          title: Name
          description: Unique agent name
        description:
          type: string
          title: Description
          description: Human-readable description
          default: ''
        tenant_ids:
          items:
            type: string
          type: array
          title: Tenant Ids
          description: Tenant IDs
        widget_config:
          anyOf:
          - $ref: '#/components/schemas/WidgetConfig'
          - type: 'null'
          description: Embed widget display configuration
        llm_config:
          anyOf:
          - $ref: '#/components/schemas/LLMConfig'
          - type: 'null'
          description: Per-agent LLM overrides
        provider_priority:
          items:
            type: string
          type: array
          title: Provider Priority
          description: Provider names in priority order (from ProviderStore)
        abuse_config:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Abuse Config
          description: Per-agent abuse settings overrides
        system_prompt:
          anyOf:
          - type: string
          - type: 'null'
          title: System Prompt
          description: Per-agent system prompt override
        voice_config:
          anyOf:
          - $ref: '#/components/schemas/VoiceAgentConfig'
          - type: 'null'
          description: Per-agent voice configuration overrides
        created_at:
          type: string
          title: Created At
          description: ISO timestamp
        updated_at:
          type: string
          title: Updated At
          description: ISO timestamp
      type: object
      required:
      - name
      - created_at
      - updated_at
      title: AgentResponse
      description: Agent metadata.
    AgentUpdateRequest:
      properties:
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Human-readable description
        tenant_ids:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Tenant Ids
          description: Tenant IDs for this agent
        widget_config:
          anyOf:
          - $ref: '#/components/schemas/WidgetConfig'
          - type: 'null'
          description: Embed widget display configuration
        llm_config:
          anyOf:
          - $ref: '#/components/schemas/LLMConfig'
          - type: 'null'
          description: Per-agent LLM overrides
        provider_priority:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Provider Priority
          description: Provider names in priority order (from ProviderStore)
        abuse_config:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Abuse Config
          description: Per-agent abuse settings overrides
        system_prompt:
          anyOf:
          - type: string
          - type: 'null'
          title: System Prompt
          description: Per-agent system prompt override
        voice_config:
          anyOf:
          - $ref: '#/components/schemas/VoiceAgentConfig'
          - type: 'null'
          description: Per-agent voice configuration overrides
      type: object
      title: AgentUpdateRequest
      description: Request to update an existing agent.
    BacklogDetailResponse:
      properties:
        records:
          items:
            $ref: '#/components/schemas/BacklogEvent'
          type: array
          title: Records
          description: List of session events
        session_id:
          type: string
          title: Session Id
          description: Requested session ID
        count:
          type: integer
          title: Count
          description: Number of records
      type: object
      required:
      - records
      - session_id
      - count
      title: BacklogDetailResponse
      description: Events of a specific backlog session.
    BacklogEvent:
      properties:
        session_id:
          type: string
          title: Session Id
          description: Session ID
        turn_id:
          type: string
          title: Turn Id
          description: Turn ID
        iteration:
          type: integer
          title: Iteration
          description: Iteration number
        event:
          type: string
          title: Event
          description: Event type
        ts:
          type: string
          title: Ts
          description: Timestamp
        data:
          additionalProperties: true
          type: object
          title: Data
          description: Event data
      additionalProperties: true
      type: object
      required:
      - session_id
      - turn_id
      - iteration
