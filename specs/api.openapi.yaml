components:
  schemas:
    AgentCreateRequest:
      description: Request to create a new agent.
      properties:
        description:
          default: ''
          description: Human-readable description
          title: Description
          type: string
        llm_config:
          anyOf:
          - $ref: '#/components/schemas/LLMConfig'
          - type: 'null'
          description: Per-agent LLM overrides
        name:
          description: Unique agent name (lowercase, no spaces)
          minLength: 1
          pattern: ^[a-z][a-z0-9_-]*$
          title: Name
          type: string
        provider_priority:
          description: Provider names in priority order (from ProviderStore)
          items:
            type: string
          title: Provider Priority
          type: array
        tenant_ids:
          description: Tenant IDs for this agent
          items:
            type: string
          title: Tenant Ids
          type: array
        widget_config:
          anyOf:
          - $ref: '#/components/schemas/WidgetConfig'
          - type: 'null'
          description: Embed widget display configuration
      required:
      - name
      title: AgentCreateRequest
      type: object
    AgentListResponse:
      description: List of agents.
      properties:
        agents:
          description: List of agents
          items:
            $ref: '#/components/schemas/AgentResponse'
          title: Agents
          type: array
      required:
      - agents
      title: AgentListResponse
      type: object
    AgentResponse:
      description: Agent metadata.
      properties:
        created_at:
          description: ISO timestamp
          title: Created At
          type: string
        description:
          default: ''
          description: Human-readable description
          title: Description
          type: string
        llm_config:
          anyOf:
          - $ref: '#/components/schemas/LLMConfig'
          - type: 'null'
          description: Per-agent LLM overrides
        name:
          description: Unique agent name
          title: Name
          type: string
        provider_priority:
          description: Provider names in priority order (from ProviderStore)
          items:
            type: string
          title: Provider Priority
          type: array
        tenant_ids:
          description: Tenant IDs
          items:
            type: string
          title: Tenant Ids
          type: array
        updated_at:
          description: ISO timestamp
          title: Updated At
          type: string
        widget_config:
          anyOf:
          - $ref: '#/components/schemas/WidgetConfig'
          - type: 'null'
          description: Embed widget display configuration
      required:
      - name
      - created_at
      - updated_at
      title: AgentResponse
      type: object
    AgentUpdateRequest:
      description: Request to update an existing agent.
      properties:
        description:
          anyOf:
          - type: string
          - type: 'null'
          description: Human-readable description
          title: Description
        llm_config:
          anyOf:
          - $ref: '#/components/schemas/LLMConfig'
          - type: 'null'
          description: Per-agent LLM overrides
        provider_priority:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Provider names in priority order (from ProviderStore)
          title: Provider Priority
        tenant_ids:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Tenant IDs for this agent
          title: Tenant Ids
        widget_config:
          anyOf:
          - $ref: '#/components/schemas/WidgetConfig'
          - type: 'null'
          description: Embed widget display configuration
      title: AgentUpdateRequest
      type: object
    BacklogDetailResponse:
      description: Events of a specific backlog session.
      properties:
        count:
          description: Number of records
          title: Count
          type: integer
        records:
          description: List of session events
          items:
            $ref: '#/components/schemas/BacklogEvent'
          title: Records
          type: array
        session_id:
          description: Requested session ID
          title: Session Id
          type: string
      required:
      - records
      - session_id
      - count
      title: BacklogDetailResponse
      type: object
    BacklogEvent:
      additionalProperties: true
      description: 'A single event/record in a backlog session.


        Fields vary by ``event`` type — ``model_response`` events contain

        ``duration_ms`` and ``tokens``. Extra fields are preserved via

        ``extra=''allow''``.'
      properties:
        data:
          additionalProperties: true
          description: Event data
          title: Data
          type: object
        event:
          description: Event type
          title: Event
          type: string
        iteration:
          description: Iteration number
          title: Iteration
          type: integer
        session_id:
          description: Session ID
          title: Session Id
          type: string
        ts:
          description: Timestamp
          title: Ts
          type: string
        turn_id:
          description: Turn ID
          title: Turn Id
          type: string
      required:
      - session_id
      - turn_id
      - iteration
      - event
      - ts
      - data
      title: BacklogEvent
      type: object
    BacklogListResponse:
      description: List of backlog sessions.
      properties:
        sessions:
          description: List of session metadata entries
          items:
            $ref: '#/components/schemas/BacklogSessionMetadata'
          title: Sessions
          type: array
      required:
      - sessions
      title: BacklogListResponse
      type: object
    BacklogSessionMetadata:
      description: Metadata for one backlog session entry.
      properties:
        first_event:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: First event
          title: First Event
        last_event:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Last event
          title: Last Event
        num_events:
          description: Number of events
          title: Num Events
          type: integer
        session_id:
          description: Session ID
          title: Session Id
          type: string
        size_bytes:
          description: File size in bytes
          title: Size Bytes
          type: integer
      required:
      - session_id
      - size_bytes
      - num_events
      title: BacklogSessionMetadata
      type: object
    ChatMessage:
      description: A single message in chat history.
      properties:
        content:
          default: ''
          description: Message text
          title: Content
          type: string
        role:
          description: 'Role: user / assistant / system'
          title: Role
          type: string
        tool_calls:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          description: Tool calls
          title: Tool Calls
      required:
      - role
      title: ChatMessage
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HealthResponse:
      description: API service health status.
      properties:
        api:
          default: ok
          title: Api
          type: string
        ollama:
          additionalProperties: true
          description: LLM provider connection status
          title: Ollama
          type: object
      required:
      - ollama
      title: HealthResponse
      type: object
    LLMConfig:
      description: Per-agent LLM configuration. All fields optional — falls back to
        global defaults when null.
      properties:
        api_base:
          anyOf:
          - type: string
          - type: 'null'
          description: Base URL for the API
          title: Api Base
        api_key:
          anyOf:
          - type: string
          - type: 'null'
          description: API key for the provider
          title: Api Key
        max_tokens:
          anyOf:
          - minimum: 1.0
            type: integer
          - type: 'null'
          description: Maximum tokens in response
          title: Max Tokens
        model:
          anyOf:
          - type: string
          - type: 'null'
          description: Model name (e.g. qwen2.5:0.5b or mistral/mistral-small)
          title: Model
        provider:
          anyOf:
          - type: string
          - type: 'null'
          description: 'LLM provider: ollama, mistral, openai, anthropic'
          title: Provider
        system_prompt:
          anyOf:
          - type: string
          - type: 'null'
          description: System prompt (overrides global)
          title: System Prompt
        temperature:
          anyOf:
          - maximum: 2.0
            minimum: 0.0
            type: number
          - type: 'null'
          description: Model temperature
          title: Temperature
      title: LLMConfig
      type: object
    SessionHistoryResponse:
      description: Chat message history for a session.
      properties:
        messages:
          description: Messages (role, content, tool_calls)
          items:
            $ref: '#/components/schemas/ChatMessage'
          title: Messages
          type: array
      required:
      - messages
      title: SessionHistoryResponse
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    WidgetConfig:
      description: Embed widget display configuration for an agent.
      properties:
        accent_color:
          default: '#0f766e'
          description: Accent color (hex)
          title: Accent Color
          type: string
        greeting:
          default: Чем могу помочь?
          description: Greeting message in chat
          title: Greeting
          type: string
        position:
          default: right
          description: 'Widget position: right | left'
          title: Position
          type: string
        title:
          default: Ассистент
          description: Widget header title
          title: Title
          type: string
      title: WidgetConfig
      type: object
info:
  description: Backend API for the Agent-Tutor system. Handles orchestration, session
    history, and tool integration.
  title: Agent-Tutor Core API
  version: 1.1.0
openapi: 3.1.0
paths:
  /admin/guardrails:
    get:
      description: Get current guard config.
      operationId: get_guardrails_admin_guardrails_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Get Guardrails
    post:
      description: 'Update guard config. Accepts: enabled, block_on_match.'
      operationId: update_guardrails_admin_guardrails_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              title: Config
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Update Guardrails
  /admin/llm-config:
    get:
      description: Get current LLM provider fallback configuration.
      operationId: get_llm_config_admin_llm_config_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Get Llm Config
  /admin/llm-provider-list:
    get:
      description: List all available providers from LiteLLM (live, no hardcode).
      operationId: list_litellm_providers_admin_llm_provider_list_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: List Litellm Providers
  /admin/llm-providers:
    get:
      description: List all LLM providers with masked API keys.
      operationId: list_llm_providers_admin_llm_providers_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: List Llm Providers
    post:
      description: "Add a new LLM provider.\n\nBody:\n    name (required): unique\
        \ provider name\n    model (required): model identifier (e.g. openai/gpt-4o,\
        \ anthropic/claude-3-sonnet)\n    provider: provider type — auto-detected\
        \ from model prefix if omitted\n    api_key: API key (will not be returned\
        \ in full)\n    api_base: custom API base URL\n    enabled: whether the provider\
        \ is active (default: true)"
      operationId: add_llm_provider_admin_llm_providers_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              title: Body
              type: object
        required: true
      responses:
        '201':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Add Llm Provider
  /admin/llm-providers/{name}:
    delete:
      description: Delete an LLM provider.
      operationId: delete_llm_provider_admin_llm_providers__name__delete
      parameters:
      - in: path
        name: name
        required: true
        schema:
          title: Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Delete Llm Provider
    get:
      description: Get a single LLM provider with masked API key.
      operationId: get_llm_provider_admin_llm_providers__name__get
      parameters:
      - in: path
        name: name
        required: true
        schema:
          title: Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Llm Provider
    put:
      description: 'Update an existing LLM provider.


        Omitted fields keep their current value.

        Set api_key="" to keep existing key (not change it).

        Set api_key="__clear__" to clear the key.'
      operationId: update_llm_provider_admin_llm_providers__name__put
      parameters:
      - in: path
        name: name
        required: true
        schema:
          title: Name
          type: string
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              title: Body
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Update Llm Provider
  /admin/llm-providers/{name}/toggle:
    post:
      description: Toggle a provider on/off.
      operationId: toggle_llm_provider_admin_llm_providers__name__toggle_post
      parameters:
      - in: path
        name: name
        required: true
        schema:
          title: Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Toggle Llm Provider
  /admin/spending:
    get:
      description: Get spending overview.
      operationId: get_all_spending_admin_spending_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Get All Spending
  /admin/spending/{tenant_id}:
    get:
      description: Get spending for a specific tenant.
      operationId: get_tenant_spending_admin_spending__tenant_id__get
      parameters:
      - in: path
        name: tenant_id
        required: true
        schema:
          title: Tenant Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Tenant Spending
    post:
      description: 'Set per-tenant budget override.


        Body: {"budget": 100.0}'
      operationId: set_tenant_budget_admin_spending__tenant_id__post
      parameters:
      - in: path
        name: tenant_id
        required: true
        schema:
          title: Tenant Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              title: Config
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Set Tenant Budget
  /api/agents:
    get:
      description: Возвращает список всех созданных агентов.
      operationId: list_agents_endpoint_api_agents_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'
          description: Successful Response
      summary: Список агентов
    post:
      description: Создаёт нового агента с указанными tenant_id.
      operationId: create_agent_endpoint_api_agents_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreateRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Создать агента
  /api/agents/{name}:
    delete:
      description: Удаляет агента по имени.
      operationId: delete_agent_endpoint_api_agents__name__delete
      parameters:
      - in: path
        name: name
        required: true
        schema:
          title: Name
          type: string
      responses:
        '204':
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Удалить агента
    get:
      description: Возвращает данные конкретного агента по имени.
      operationId: get_agent_endpoint_api_agents__name__get
      parameters:
      - in: path
        name: name
        required: true
        schema:
          title: Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Получить агента
    put:
      description: Обновляет описание и/или tenant_id агента.
      operationId: update_agent_endpoint_api_agents__name__put
      parameters:
      - in: path
        name: name
        required: true
        schema:
          title: Name
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdateRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Обновить агента
  /api/agents/{name}/widget-config:
    get:
      description: Возвращает настройки embed-виджета для указанного агента.
      operationId: agent_widget_config_endpoint_api_agents__name__widget_config_get
      parameters:
      - in: path
        name: name
        required: true
        schema:
          title: Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Agent Widget Config Endpoint Api Agents  Name  Widget
                  Config Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Конфиг виджета для агента
  /api/backlog:
    get:
      description: Возвращает список всех сохраненных сессий из бэклога.
      operationId: backlog_list_endpoint_api_backlog_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacklogListResponse'
          description: Successful Response
      summary: Список сессий бэклога
  /api/backlog/errors:
    get:
      description: Возвращает последние ошибки по всем сессиям.
      operationId: backlog_errors_endpoint_api_backlog_errors_get
      parameters:
      - in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Последние ошибки бэклога
  /api/backlog/stats/{session_id}:
    get:
      description: Возвращает агрегированную статистику по токенам, стоимости и количеству
        вызовов для сессии.
      operationId: backlog_stats_endpoint_api_backlog_stats__session_id__get
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          title: Session Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Статистика LLM-вызовов сессии
  /api/backlog/{session_id}:
    get:
      description: Возвращает все события конкретной сессии.
      operationId: backlog_detail_endpoint_api_backlog__session_id__get
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          title: Session Id
          type: string
      - in: query
        name: limit
        required: false
        schema:
          default: 500
          minimum: 1
          title: Limit
          type: integer
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0
          title: Offset
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacklogDetailResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Детали сессии бэклога
  /api/chat:
    post:
      description: Основной эндпоинт для общения с агентом. Возвращает поток SSE событий.
      operationId: chat_endpoint_api_chat_post
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Стриминг чата
  /api/chat/{name}:
    post:
      description: Стриминг чата с конкретным агентом. Tenant IDs берутся из конфига
        агента.
      operationId: chat_by_agent_endpoint_api_chat__name__post
      parameters:
      - in: path
        name: name
        required: true
        schema:
          title: Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Чат с агентом по имени
  /api/session/history:
    get:
      description: Возвращает историю сообщений для указанной сессии.
      operationId: session_history_endpoint_api_session_history_get
      parameters:
      - in: query
        name: session_id
        required: false
        schema:
          default: default
          title: Session Id
          type: string
      - in: query
        name: agent_name
        required: false
        schema:
          title: Agent Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionHistoryResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
