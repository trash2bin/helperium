[project]
name = "agent-tutor"
version = "0.0.2"
readme = "README.md"
description = "University MCP server"
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]>=1.0.0",
    "pydantic>=2.0.0",
    "faker>=20.0.0",
    "pypdf>=5.0.0",
    "python-docx>=1.1.0",
    "chromadb>=1.5.9",
    "sentence-transformers>=5.5.1",
]

[project.scripts]
agent-tutor = "server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.force-include]
"fixtures.json" = "fixtures.json"
