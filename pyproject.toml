[project]
name = "agent-tutor"
version = "0.0.4"
readme = "README.md"
description = "University MCP server"
requires-python = ">=3.12, <3.14" # tokie (dependencies for chonkie) needs Python 3.12+ and <3.14 (stable)
dependencies = [
    "mcp[cli]>=1.0.0",
    "pydantic>=2.0.0",
    "httpx>=0.28.0",
    "starlette>=0.50.0",
    "uvicorn[standard]>=0.38.0",
    "faker>=20.0.0",
    "docling>=2.0.0",
    "chonkie[semantic]>=1.0.0",
    "chromadb>=1.5.9",
    "sentence-transformers>=5.5.1",
    "python-docx>=1.2.0",
    "litellm>=1.86.2",
    "fastapi>=0.137.2",
]

[project.scripts]
agent-tutor = "mcp_server.server:main"
agent-ingest = "fixtures.ingest:main" # Ingest documents into the local RAG index
agent-chat-api = "demo.api:main"
agent-demo-web = "demo.web:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.hatch.build.targets.wheel.force-include]
"fixtures.json" = "fixtures.json"
