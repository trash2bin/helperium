global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'data-service'
    static_configs:
      - targets: ['data-service:8084']

  - job_name: 'mcp-gateway'
    static_configs:
      - targets: ['mcp-gateway:8083']

  - job_name: 'api-service'
    static_configs:
      - targets: ['api:8081']

  - job_name: 'admin-dashboard'
    static_configs:
      - targets: ['admin-dashboard:8085']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
