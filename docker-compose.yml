# docker compose with 4 long-running services + optional profiles
# Dev:   docker compose up -d
# Prod:  docker compose --profile prod up -d

x-restart: &restart
  restart: unless-stopped

x-healthcheck: &hc-curl
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 15s

services:
  # ──────────────────────────────────────────────────────────────────
  # PostgreSQL (локальная БД для разработки / pre-prod)
  # Поднять:  docker compose up db
  #          docker compose up -d db
  # Проверить: docker compose exec db psql -U tutor -d helperium -c '\dt'
  # ──────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor
      POSTGRES_DB: helperium
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor -d helperium"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - helperium-net
    <<: *restart

  data-service:
    image: helperium-data:latest
    build:
      context: .
      dockerfile: data-service/Dockerfile
    ports:
      - "127.0.0.1:8084:8084"
    volumes:
      - app_data:/data/app:ro
      - uploads_data:/data/uploads:ro
    environment:
      - DB_DRIVER=${DB_DRIVER:-sqlite}
      - DB_PATH=/data/app/university.db
      - DATABASE_URL=${DATABASE_URL:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8084/health"]
      <<: *hc-curl
      start_period: 5s
    networks:
      - helperium-net
    <<: *restart

  rag:
    profiles: ["full", "rag"]
    image: helperium-rag:latest
    build:
      context: .
      dockerfile: rag/Dockerfile
    ports:
      - "127.0.0.1:8082:8082"
    volumes:
      - rag_data:/data/rag
      - hf_cache:/home/app/.cache/huggingface
    environment:
      - CHROMA_PATH=/data/rag/chroma_db
      - RAG_DB_PATH=/data/rag/rag_documents.db
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      - RAG_DEVICE=${RAG_DEVICE:-cpu}
      - RAG_CHUNKER_TYPE=${RAG_CHUNKER_TYPE:-semantic}
      - RAG_LOCAL_FILES_ONLY=${RAG_LOCAL_FILES_ONLY:-0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8082/health"]
      <<: *hc-curl
      start_period: 120s
    networks:
      - helperium-net
    <<: *restart

  # MCP-gateway (Go, фаза 3.4+) — основной MCP-сервер, инструменты из конфига
  mcp-gateway:
    image: helperium-mcp-gateway:latest
    build:
      context: .
      dockerfile: mcp-gateway/Dockerfile
    ports:
      - "127.0.0.1:8083:8083"
    environment:
      - DATA_SERVICE_URL=http://data-service:8084
      - RAG_SERVICE_URL=http://rag:8082
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8083/health"]
      <<: *hc-curl
    depends_on:
      data-service:
        condition: service_healthy
    networks:
      - helperium-net
    <<: *restart


  api:
    image: helperium-api:latest
    build:
      context: .
      dockerfile: api-service/Dockerfile
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - app_data:/data/app
    environment:
      - MCP_SERVICE_URL=http://mcp-gateway:8083/mcp
      - DB_PATH=/data/app/university.db
      - DEMO_SESSION_DB_PATH=/data/app/demo_sessions.sqlite
      - BACKLOG_DIR=/data/app/backlog
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:0.5b}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - MISTRAL_MODEL=${MISTRAL_MODEL:-mistral/mistral-small}
      - ENABLE_THINK=${ENABLE_THINK:-true}
      - DEMO_REQUEST_TIMEOUT=${DEMO_REQUEST_TIMEOUT:-600}
      - DEMO_HISTORY_TURNS=${DEMO_HISTORY_TURNS:-8}
      - DEMO_HISTORY_CONTENT_CHARS=${DEMO_HISTORY_CONTENT_CHARS:-6000}
      - AGENT_TEMPERATURE=${AGENT_TEMPERATURE:-0.5}
      - AGENT_MAX_ITERATIONS=${AGENT_MAX_ITERATIONS:-5}
      - AGENT_MAX_TOKENS_THINKING=${AGENT_MAX_TOKENS_THINKING:-4096}
      - AGENT_MAX_EMPTY_ROUNDS=${AGENT_MAX_EMPTY_ROUNDS:-3}
      - BACKLOG_RETENTION_DAYS=${BACKLOG_RETENTION_DAYS:-30}
      - CHAT_RATE_LIMIT=${CHAT_RATE_LIMIT:-30/minute}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      - DEMO_DEBUG=${DEMO_DEBUG:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8081/health"]
      <<: *hc-curl
    depends_on:
      mcp-gateway:
        condition: service_healthy
    networks:
      - helperium-net
    <<: *restart

  admin-dashboard:
    image: helperium-admin:latest
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8085:8085"
    volumes:
      - uploads_data:/data/uploads
    environment:
      - DATA_SERVICE_URL=http://data-service:8084
      - RAG_SERVICE_URL=http://rag:8082
      - API_SERVICE_URL=http://api:8081
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - DATA_DIR=/data/uploads
    depends_on:
      data-service:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - helperium-net
    <<: *restart

  web:
    image: helperium-web:latest
    build:
      context: .
      dockerfile: demo/web/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - WEB_ORIGIN=${WEB_ORIGIN:-*}
      - API_BEARER_TOKEN=${API_BEARER_TOKEN:-}
      - DEMO_API_HOST=api
      - DEMO_API_PORT=8081
      - DATA_SERVICE_URL=http://data-service:8084
      - RAG_SERVICE_URL=http://rag:8082
      - WEB_PROXY_TIMEOUT=${WEB_PROXY_TIMEOUT:-30.0}
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-default}
      - DEMO_TENANTS=${DEMO_TENANTS:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/"]
      <<: *hc-curl
    depends_on:
      api:
        condition: service_healthy
    networks:
      - helperium-net
    <<: *restart

  # CADDY (profile: prod): HTTPS + reverse-proxy to web
  caddy:
    image: caddy:2
    profiles:
      - prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      web:
        condition: service_healthy
    networks:
      - helperium-net
    <<: *restart

  # ──────────────────────────────────────────────────────────────────
  # MONITORING (profile: monitoring)
  # Поднять:  docker compose --profile monitoring up -d
  # Войти в Grafana: http://127.0.0.1:3000  admin/admin
  # ──────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    profiles:
      - monitoring
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - helperium-net
    <<: *restart

  grafana:
    image: grafana/grafana:latest
    profiles:
      - monitoring
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - helperium-net
    <<: *restart

volumes:
  app_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./.data/app
  rag_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./.data/rag
  hf_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./.data/hf_cache
  uploads_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./.data/uploads
  pg_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./.data/pg
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:

networks:
  helperium-net:
    driver: bridge
